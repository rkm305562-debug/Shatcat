<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>شات كات</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- ── Splash Screen ── -->
    <div id="splash-screen">
      <div class="splash-logo">
        <img src="assets/logo.svg" alt="شات كات">
      </div>
      <div class="splash-title">شات كات</div>
      <div class="splash-subtitle">حيث كل محادثة تهم 🐱</div>
      <div class="splash-progress">
        <div class="splash-progress-bar"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const currentUser = CC.Storage.get(CC.KEYS.CURRENT_USER);
        CC.navigate(currentUser ? 'home.html' : 'login.html');
      }, 2500);
    });
  </script>
</body>
</html>
