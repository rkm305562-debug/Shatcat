<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>تسجيل الدخول — شات كات</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <div class="auth-page">
      <div class="auth-bg-glow glow-1"></div>
      <div class="auth-bg-glow glow-2"></div>

      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-wrap">
            <img src="assets/logo.svg" alt="شات كات">
            <div style="text-align:right;">
              <div style="font-size:1.8rem;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;">شات كات</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">دردشة اجتماعية</div>
            </div>
          </div>
          <h2 style="font-size:1.4rem;margin-bottom:4px;">مرحباً بعودتك! 👋</h2>
          <p>سجّل الدخول لمتابعة الدردشة</p>
        </div>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="login-username">اسم المستخدم</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input class="form-input" type="text" id="login-username" placeholder="أدخل اسم المستخدم" autocomplete="username" required minlength="3">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">كلمة المرور</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input class="form-input" type="password" id="login-password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
              <span class="input-icon-right" id="toggle-password">👁</span>
            </div>
          </div>

          <div id="login-error" class="form-error" style="margin-bottom:12px;font-size:0.85rem;"></div>

          <button type="submit" id="login-submit" class="btn btn-primary btn-full btn-lg">تسجيل الدخول</button>
        </form>

        <div class="divider-text">أو</div>

        <div style="background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.15);border-radius:var(--radius-md);padding:10px 14px;font-size:0.78rem;color:var(--text-muted);line-height:1.6;">
          🔑 المدير: <code style="color:var(--accent-primary);">admin</code> / <code style="color:var(--accent-primary);">Admin@2027</code>
        </div>

        <div class="auth-footer">
          ليس لديك حساب؟ <a href="register.html">أنشئ واحداً</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (CC.Storage.get(CC.KEYS.CURRENT_USER)) CC.navigate('home.html');
      initLoginPage();
    });
  </script>
</body>
</html>
